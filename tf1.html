<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Force 1</title>
<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }
.boatCard { background:#0f172a; border-radius:14px; padding:16px; }
.status-green { color:#22c55e; }
.status-red { color:#ef4444; }
.status-orange { color:#f97316; }
</style>
</head>

<body class="bg-slate-900 text-white">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <h1 class="text-3xl font-black">Task Force 1</h1>

  <div class="mt-4 flex justify-center gap-3 flex-wrap">
    <a href="admin.html"
       class="px-5 py-2 bg-blue-600 rounded-lg font-bold text-sm">
       ← Back to Admin
    </a>

    <a href="https://forms.gle/kdwPNq8T5dT4QjEZ7"
       target="_blank"
       class="px-5 py-2 bg-yellow-400 text-black rounded-lg font-bold text-sm">
       Submit Update
    </a>
  </div>
</header>

<main class="p-6 max-w-6xl mx-auto">
  <div id="boatGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</main>

<script>

const SHEET_ID = "1blTaHa4BTR8YGB7hL_kqWBE1qXkl9Ee2LEe_zLKbQGs";

function statusColor(status){
  if(!status) return "";
  const s = status.toLowerCase();
  if(s.includes("secure")) return "status-green";
  if(s.includes("underway")) return "status-red";
  if(s.includes("rtb")) return "status-orange";
  return "";
}

async function fetchSheet(){
  const query = encodeURIComponent("select B,C,D,E,F,G");
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows || [];
}

async function loadData(){
  const rows = await fetchSheet();
  const grid = document.getElementById("boatGrid");
  grid.innerHTML = "";

  const boats = {};

  rows.forEach(row=>{
    const boat = row.c[0]?.v;
    if(!boat) return;

    if(!boats[boat]){
      boats[boat] = {
        persons: null,
        risk: "",
        gain: "",
        status: "",
        comment: ""
      };
    }

    // Persons = last non-blank (0 allowed)
    if(row.c[1] && row.c[1].v !== "" && row.c[1].v !== null){
      boats[boat].persons = row.c[1].v;
    }

    // Always overwrite with latest submission values
    boats[boat].risk = row.c[2]?.v ?? boats[boat].risk;
    boats[boat].gain = row.c[3]?.v ?? boats[boat].gain;
    boats[boat].status = row.c[4]?.v ?? boats[boat].status;

    // Comment only from most recent submission
    boats[boat].comment = row.c[5]?.v ?? "";
  });

  Object.keys(boats).forEach(boat=>{
    const d = boats[boat];

    grid.innerHTML += `
      <div class="boatCard">
        <div class="text-lg font-bold">${boat}</div>
        <div class="text-sm">Persons on Board: ${d.persons !== null ? d.persons : "—"}</div>
        <div class="text-sm">GAR Risk: ${d.risk || "—"}</div>
        <div class="text-sm">GAR Gain: ${d.gain || "—"}</div>
        <div class="font-bold mt-2 ${statusColor(d.status)}">
          ${d.status || "—"}
        </div>
        ${d.comment ? `<div class="text-xs text-slate-400 mt-2">${d.comment}</div>` : ""}
      </div>
    `;
  });
}

loadData();
setInterval(loadData, 30000);

</script>
</body>
</html>
