
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Task Force 1 - Dashboard</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }
#content { display:none; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:20px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.boatCard {
  background:#0f172a;
  border-radius:14px;
  padding:16px;
}

.status-green { color:#22c55e; }
.status-red { color:#ef4444; }
.status-orange { color:#f97316; }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>
    <input type="password" id="adminPassword"
      class="w-full p-3 rounded bg-slate-700 mb-4"
      placeholder="Enter Admin Password">
    <button onclick="checkPassword()"
      class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Task Force 1
    </button>
  </div>
</div>

<div id="content">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <h1 class="text-3xl font-black">Task Force 1</h1>

  <div class="mt-4 flex justify-center gap-3 flex-wrap">
    <a href="admin.html"
       class="px-5 py-2 bg-blue-600 rounded-lg font-bold text-sm">
       ← Back to Admin
    </a>

    <a href="https://forms.gle/kdwPNq8T5dT4QjEZ7"
       target="_blank"
       class="px-5 py-2 bg-yellow-400 text-black rounded-lg font-bold text-sm">
       Submit Update
    </a>
  </div>
</header>

<main class="p-6 max-w-6xl mx-auto space-y-6">

  <div class="card">
    <div class="text-xl font-bold mb-4">Live Dashboard</div>
    <div id="boatGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

</main>

</div>

<script>

const ADMIN_PASSWORD = "SAR2026";

const SHEET_ID = "1blTaHa4BTR8YGB7hL_kqWBE1qXkl9Ee2LEe_zLKbQGs";

window.addEventListener("load", ()=>{
  if(localStorage.getItem("sarAdminAuth")==="true") showPage();
});

function checkPassword(){
  const input=document.getElementById("adminPassword").value.trim();
  if(input===ADMIN_PASSWORD){
    localStorage.setItem("sarAdminAuth","true");
    showPage();
  }
}

function showPage(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("content").style.display="block";
  loadData();
}

function getStatusClass(status){
  if(!status) return "";
  const s=status.toLowerCase();
  if(s.includes("secure")) return "status-green";
  if(s.includes("underway")) return "status-red";
  if(s.includes("rtb")) return "status-orange";
  return "";
}

async function fetchSheet(){
  const query=encodeURIComponent("select B,C,F,G");
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows||[];
}

async function loadData(){
  const rows=await fetchSheet();
  const grid=document.getElementById("boatGrid");
  grid.innerHTML="";

  if(!rows.length){
    grid.innerHTML="<div>No data available</div>";
    return;
  }

  const latest={};

  rows.forEach(r=>{
    const boat=r.c[0]?.v;
    const persons=r.c[1]?.v;
    const status=r.c[2]?.v;
    const comment=r.c[3]?.v;

    if(!boat) return;

    latest[boat]={
      persons: persons||0,
      status: status||"No Status",
      comment: comment||""
    };
  });

  Object.keys(latest).forEach(boat=>{
    const data=latest[boat];
    const statusClass=getStatusClass(data.status);

    const commentHTML=data.comment
      ? `<div class="text-sm text-slate-400 mt-2">${data.comment}</div>`
      : "";

    grid.innerHTML+=`
      <div class="boatCard">
        <div class="text-lg font-bold">${boat}</div>
        <div class="text-sm text-slate-300 mt-1">
          Persons On Board: ${data.persons}
        </div>
        <div class="font-bold mt-2 ${statusClass}">
          ${data.status}
        </div>
        ${commentHTML}
      </div>
    `;
  });
}

setInterval(loadData,60000);

</script>

</body>
</html>
