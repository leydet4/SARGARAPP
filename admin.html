<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.select {
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#334155;
  font-weight:600;
  color:white;
}

#tableWrapper {
  height:80vh;
  overflow:auto;
  background:white;
  border-radius:16px;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:13px; /* zoomed out slightly */
}

th, td {
  padding:6px 10px;
  border:1px solid #ddd;
  text-align:center; /* centered */
  white-space:nowrap;
}

th {
  background:#0f172a;
  color:white;
  position:sticky;
  top:0;
  z-index:5;
}

#adminContent { display:none; }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <img src="SAR.png" class="mx-auto h-14 mb-4">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>
    <input type="password"
           id="adminPassword"
           placeholder="Enter Admin Password"
           class="w-full p-3 rounded bg-slate-700 mb-4">
    <button onclick="checkPassword()"
            class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Admin Panel
    </button>
    <div id="loginError" class="mt-3 text-red-400 font-bold hidden">
      Incorrect password
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminContent">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <img src="SAR.png" class="mx-auto h-16 mb-3">
  <h1 class="text-2xl font-black">Admin Dashboard</h1>
  <a href="index.html"
     class="inline-block mt-4 px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm">
     ← Back to Dashboard
  </a>
</header>

<section class="p-6 max-w-7xl mx-auto space-y-8">

<div class="card">
<h2 class="text-xl font-bold mb-4">GAR Submissions</h2>

<select id="sheetSelector" class="select mb-6">
  <option value="">Select GAR Sheet...</option>
  <option value="462942313">Task Force 1</option>
  <option value="653219596">Task Force 2</option>
  <option value="1655685068">Task Force 3</option>
  <option value="70233464">Task Force 4</option>
  <option value="477824279">Admin / Other</option>
</select>

<div id="tableWrapper" class="hidden">
  <div id="sheetTable"></div>
</div>

</div>
</section>
</div>

<script>

const ADMIN_PASSWORD = "SAR2026";

function checkPassword() {
  const input = document.getElementById("adminPassword").value;
  if (input === ADMIN_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
  } else {
    document.getElementById("loginError").classList.remove("hidden");
  }
}

const sheetID = "1xfMcENDbVbWkwuexGOFjfz9MGp8aD5eFxslVIaeDDdg";

document.getElementById("sheetSelector").addEventListener("change", function() {
  const gid = this.value;
  if (!gid) return;

  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?gid=${gid}`;

  fetch(url)
    .then(res => res.text())
    .then(text => {
      const json = JSON.parse(text.substring(47).slice(0, -2));
      renderTable(json.table);
      document.getElementById("tableWrapper").classList.remove("hidden");
    });
});

function renderTable(tableData) {
  const container = document.getElementById("sheetTable");
  container.innerHTML = "";

  const table = document.createElement("table");

  const headerRow = document.createElement("tr");
  tableData.cols.forEach(col => {
    const th = document.createElement("th");
    th.innerText = col.label || "";
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);

  tableData.rows.forEach(row => {
    const tr = document.createElement("tr");
    row.c.forEach(cell => {
      const td = document.createElement("td");
      td.innerText = cell ? cell.v : "";
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });

  container.appendChild(table);
}

</script>

</body>
</html>
