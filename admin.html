<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Admin Dashboard - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

#adminContent { display:none; }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <img src="SAR.png" class="mx-auto h-14 mb-4">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>

    <input type="password"
           id="adminPassword"
           class="w-full p-3 rounded bg-slate-700 mb-4"
           placeholder="Enter Admin Password">

    <button onclick="checkPassword()"
      class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Admin Panel
    </button>

    <div id="loginError" class="mt-3 text-red-400 font-bold hidden">
      Incorrect password
    </div>
  </div>
</div>

<div id="adminContent">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <img src="SAR.png" class="mx-auto h-16 mb-3">
  <h1 class="text-2xl font-black">Admin Dashboard</h1>
</header>

<section class="p-6 max-w-6xl mx-auto space-y-8">

<!-- 🚢 Harbor Master Page Link -->
<div class="card text-center">
  <h2 class="text-2xl font-black mb-4">Harbor Master Operations</h2>
  <p class="text-slate-300 mb-6">
    Live boat identification, status, and latest comments from all Task Forces.
  </p>

  <a href="harbor-master.html"
     class="inline-block bg-indigo-600 hover:bg-indigo-700 px-10 py-5 rounded-xl font-bold text-xl transition hover:scale-105">
     Open Harbor Master →
  </a>
</div>

<!-- Task Force Tracking -->
<div class="card text-center">
  <h2 class="text-xl font-bold mb-4">Task Force Tracking Aid</h2>

  <a href="task-force-tracking.html"
     class="inline-block bg-emerald-600 hover:bg-emerald-700 px-8 py-4 rounded-xl font-bold text-lg transition hover:scale-105">
     Open Task Force Tracking →
  </a>
</div>

</section>
</div>

<script>
const ADMIN_PASSWORD = "SAR2026";

window.addEventListener("load", () => {
  if (localStorage.getItem("sarAdminAuth") === "true") {
    showAdmin();
  }
});

function checkPassword() {
  const input = document.getElementById("adminPassword").value.trim();
  if (input === ADMIN_PASSWORD) {
    localStorage.setItem("sarAdminAuth", "true");
    showAdmin();
  } else {
    document.getElementById("loginError").classList.remove("hidden");
  }
}

function showAdmin() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("adminContent").style.display = "block";
}

function logout() {
  localStorage.removeItem("sarAdminAuth");
  location.reload();
}
</script>

</body>
</html>
