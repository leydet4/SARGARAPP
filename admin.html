<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Admin Dashboard - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: system-ui, sans-serif; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.select {
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#334155;
  font-weight:600;
  color:white;
}

#sheetContainer {
  width:100%;
  height:80vh;
  overflow:auto;
  border-radius:16px;
  background:white;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

#sheetFrame {
  width:1400px;
  height:100%;
  border:none;
  transform:scale(.9);
  transform-origin: top left;
}

#adminContent { display:none; }

/* PDF Modal */
#pdfModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:none;
  flex-direction:column;
  z-index:100;
}

#pdfHeader {
  background:#0f172a;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#pdfContainer {
  flex:1;
  overflow:auto;
  background:#e5e7eb;
  padding:20px;
}

canvas {
  margin-bottom:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <img src="SAR.png" class="mx-auto h-14 mb-4">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>
    <input type="password"
           id="adminPassword"
           placeholder="Enter Admin Password"
           class="w-full p-3 rounded bg-slate-700 mb-4">
    <button onclick="checkPassword()"
            class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Admin Panel
    </button>
    <div id="loginError" class="mt-3 text-red-400 font-bold hidden">
      Incorrect password
    </div>
  </div>
</div>

<div id="adminContent">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <img src="SAR.png" class="mx-auto h-16 mb-3">
  <h1 class="text-2xl font-black">Admin Dashboard</h1>
  <a href="index.html"
     class="inline-block mt-4 px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm">
     ← Back to Dashboard
  </a>
</header>

<section class="p-6 max-w-7xl mx-auto space-y-10">

<!-- GAR Viewer -->
<div class="card">
  <h2 class="text-xl font-bold mb-4">GAR Submissions</h2>

  <select id="sheetSelector" class="select mb-6">
    <option value="">Select GAR Sheet...</option>
    <option value="462942313">Task Force 1</option>
    <option value="653219596">Task Force 2</option>
    <option value="1655685068">Task Force 3</option>
    <option value="70233464">Task Force 4</option>
    <option value="477824279">Admin / Other</option>
  </select>

  <div id="sheetContainer" class="hidden">
    <iframe id="sheetFrame"></iframe>
  </div>
</div>

<!-- Admin PDFs -->
<div class="card">
  <h2 class="text-xl font-bold mb-6">Admin Documents</h2>
  <div id="adminDocs" class="space-y-4"></div>
</div>

</section>
</div>

<!-- PDF MODAL -->
<div id="pdfModal">
  <div id="pdfHeader">
    <div id="pdfTitle" class="font-bold">Document Viewer</div>

    <div class="flex gap-2">
      <button onclick="zoomOut()" class="bg-gray-600 px-3 py-1 rounded font-bold">−</button>
      <button onclick="zoomIn()" class="bg-gray-600 px-3 py-1 rounded font-bold">+</button>
      <button onclick="fitToWidth()" class="bg-blue-600 px-3 py-1 rounded font-bold">Fit</button>
      <button onclick="closePDF()" class="bg-red-600 px-4 py-1 rounded font-bold">Close</button>
    </div>
  </div>

  <div id="pdfContainer"></div>
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let currentPDF = null;
let currentScale = 1.2;

const ADMIN_PASSWORD = "SAR2026";

function checkPassword() {
  const input = document.getElementById("adminPassword").value.trim();
  if (input === ADMIN_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
    loadAdminPDFs();
  } else {
    document.getElementById("loginError").classList.remove("hidden");
  }
}

// GAR SHEETS
const sheetID = "1xfMcENDbVbWkwuexGOFjfz9MGp8aD5eFxslVIaeDDdg";
const base =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:html&gid=`;

document.getElementById("sheetSelector").addEventListener("change", function() {
  const gid = this.value;
  const frame = document.getElementById("sheetFrame");
  const container = document.getElementById("sheetContainer");

  if (!gid) {
    container.classList.add("hidden");
    frame.src = "";
    return;
  }

  frame.src = base + gid;
  container.classList.remove("hidden");
});

// Admin PDFs
const adminPDFs = [
  { name: "SAR Staff Registration", file: "SAR Staff Registration.pdf" },
  { name: "SAR 2026 ICS 203", file: "SAR 2026 ICS 203.pdf" },
  { name: "SAR 2026 ICS 205", file: "SAR 2026 ICS 205.pdf" }
];

function loadAdminPDFs() {
  const container = document.getElementById("adminDocs");
  container.innerHTML = "";

  adminPDFs.forEach(doc => {
    const row = document.createElement("div");
    row.className = "flex justify-between items-center bg-slate-700 p-4 rounded-lg";

    row.innerHTML = `
      <div class="font-semibold">${doc.name}</div>
      <button onclick="openPDF('/resources/${doc.file}', '${doc.name}')"
        class="bg-yellow-400 text-black px-4 py-2 rounded font-bold">
        View
      </button>
    `;

    container.appendChild(row);
  });
}

async function openPDF(path, title) {
  document.getElementById("pdfTitle").innerText = title;
  document.getElementById("pdfModal").style.display = "flex";

  const loadingTask = pdfjsLib.getDocument(path);
  currentPDF = await loadingTask.promise;

  fitToWidth();
}

async function renderPDF() {
  const container = document.getElementById("pdfContainer");
  container.innerHTML = "";

  for (let i = 1; i <= currentPDF.numPages; i++) {
    const page = await currentPDF.getPage(i);
    const viewport = page.getViewport({ scale: currentScale });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    container.appendChild(canvas);

    await page.render({
      canvasContext: context,
      viewport: viewport
    }).promise;
  }
}

function zoomIn() { currentScale += 0.2; renderPDF(); }
function zoomOut() { if (currentScale > 0.4) { currentScale -= 0.2; renderPDF(); } }

function fitToWidth() {
  const containerWidth = document.getElementById("pdfContainer").clientWidth;
  currentPDF.getPage(1).then(page => {
    const viewport = page.getViewport({ scale: 1 });
    currentScale = containerWidth / viewport.width;
    renderPDF();
  });
}

function closePDF() {
  document.getElementById("pdfContainer").innerHTML = "";
  document.getElementById("pdfModal").style.display = "none";
  currentPDF = null;
}

</script>

</body>
</html>
