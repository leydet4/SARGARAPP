<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Admin Dashboard - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: system-ui, sans-serif; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.select {
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#334155;
  font-weight:600;
  color:white;
}

#sheetContainer {
  width:100%;
  height:80vh;
  overflow:auto;
  border-radius:16px;
  background:white;
  box-shadow:0 0 25px rgba(0,0,0,.35);
  -webkit-overflow-scrolling: touch;
}

#sheetFrame {
  width:1400px;
  height:100%;
  border:none;
  transform:scale(.9);
  transform-origin: top left;
}

#adminContent { display:none; }

/* PDF MODAL */
#pdfModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:none;
  flex-direction:column;
  z-index:100;
  padding-top: env(safe-area-inset-top);
}

#pdfHeader {
  background:#0f172a;
  padding:16px;
  padding-top: calc(16px + env(safe-area-inset-top));
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
}

#pdfContainer {
  flex:1;
  overflow:auto;
  background:#e5e7eb;
  padding:20px;
}

canvas {
  margin-bottom:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <img src="SAR.png" class="mx-auto h-14 mb-4">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>
    <input type="password"
           id="adminPassword"
           placeholder="Enter Admin Password"
           class="w-full p-3 rounded bg-slate-700 mb-4">
    <button onclick="checkPassword()"
            class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Admin Panel
    </button>
    <div id="loginError" class="mt-3 text-red-400 font-bold hidden">
      Incorrect password
    </div>
  </div>
</div>

<div id="adminContent">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <img src="SAR.png" class="mx-auto h-16 mb-3">
  <h1 class="text-2xl font-black">Admin Dashboard</h1>

  <div class="mt-4 flex justify-center gap-3 flex-wrap">
    <a href="index.html"
       class="px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm">
       ← Back to Dashboard
    </a>

    <button onclick="logout()"
       class="px-5 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-sm">
       Logout
    </button>
  </div>
</header>

<section class="p-6 max-w-7xl mx-auto space-y-10">

<!-- 🔥 TASK FORCE TRACKING AID LARGE BUTTON -->
<div class="card text-center">
  <h2 class="text-2xl font-black mb-4">Task Force Tracking Aid</h2>
  <p class="text-slate-300 mb-6">
    View live SAR unit tracking submissions and access task force reporting forms.
  </p>

  <a href="task-force-tracking.html"
     class="inline-block bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-5 rounded-xl font-bold text-xl shadow-lg transition transform hover:scale-105">
     Open Task Force Tracking →
  </a>
</div>

<!-- GAR VIEWER -->
<div class="card">
  <h2 class="text-xl font-bold mb-4">GAR Submissions</h2>

  <select id="sheetSelector" class="select mb-6">
    <option value="">Select GAR Sheet...</option>
    <option value="462942313">Task Force 1</option>
    <option value="653219596">Task Force 2</option>
    <option value="1655685068">Task Force 3</option>
    <option value="70233464">Task Force 4</option>
    <option value="477824279">Admin / Other</option>
  </select>

  <div id="sheetContainer" class="hidden">
    <iframe id="sheetFrame"></iframe>
  </div>
</div>

<!-- ADMIN DOCUMENTS -->
<div class="card">
  <h2 class="text-xl font-bold mb-6">Admin Documents</h2>
  <div id="adminDocs" class="space-y-4"></div>
</div>

</section>
</div>

<script>

const ADMIN_PASSWORD = "SAR2026";

window.addEventListener("load", () => {
  if (localStorage.getItem("sarAdminAuth") === "true") {
    showAdmin();
  }
});

function checkPassword() {
  const input = document.getElementById("adminPassword").value.trim();
  if (input === ADMIN_PASSWORD) {
    localStorage.setItem("sarAdminAuth", "true");
    showAdmin();
  } else {
    document.getElementById("loginError").classList.remove("hidden");
  }
}

function showAdmin() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("adminContent").style.display = "block";
}

function logout() {
  localStorage.removeItem("sarAdminAuth");
  location.reload();
}

const sheetID = "1xfMcENDbVbWkwuexGOFjfz9MGp8aD5eFxslVIaeDDdg";
const base =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:html&gid=`;

document.getElementById("sheetSelector").addEventListener("change", function() {
  const gid = this.value;
  const frame = document.getElementById("sheetFrame");
  const container = document.getElementById("sheetContainer");

  if (!gid) {
    container.classList.add("hidden");
    frame.src = "";
    return;
  }

  frame.src = base + gid;
  container.classList.remove("hidden");
});

</script>
</body>
</html>
