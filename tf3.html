<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Force 3</title>
<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }
.boatCard { background:#0f172a; border-radius:14px; padding:16px; }
.status-green { color:#22c55e; }
.status-red { color:#ef4444; }
.status-orange { color:#f97316; }

.sheetWrap {
  width:100%;
  height:70vh;
  overflow:auto;
  border-radius:16px;
  background:white;
  box-shadow:0 0 25px rgba(0,0,0,.35);
  -webkit-overflow-scrolling: touch;
}
.sheetFrame {
  width:1400px;
  height:100%;
  border:none;
  transform:scale(.9);
  transform-origin: top left;
}
</style>
</head>

<body class="bg-slate-900 text-white">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <h1 class="text-3xl font-black">Task Force 3</h1>

  <div class="mt-4 flex justify-center gap-3 flex-wrap">
    <a href="admin.html" class="px-5 py-2 bg-blue-600 rounded-lg font-bold text-sm">← Back to Admin</a>

    <a href="https://forms.gle/oecqWnBxEJERwyhJA"
       target="_blank"
       class="px-5 py-2 bg-yellow-400 text-black rounded-lg font-bold text-sm">
      Submit Update
    </a>
  </div>
</header>

<main class="p-6 max-w-7xl mx-auto space-y-10">

  <!-- LIVE DASHBOARD -->
  <section>
    <h2 class="text-xl font-bold mb-4">Live Dashboard</h2>
    <div id="boatGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </section>

  <!-- FULL SHEET VIEW -->
  <section>
    <h2 class="text-xl font-bold mb-4">Full Sheet View</h2>
    <div class="sheetWrap">
      <iframe class="sheetFrame" id="sheetFrame"></iframe>
    </div>
  </section>

</main>

<script>
const SHEET_ID = "1Zd7SiEV9OOr20oWRB51Y6wUFCAhsM_H2YlqWD_FQW6Y";
const SHEET_EMBED = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:html`;

function isPresent(v){ return v !== null && v !== undefined && v !== ""; }

function statusColor(status){
  if(!status) return "";
  const s = String(status).toLowerCase();
  if(s.includes("secure")) return "status-green";
  if(s.includes("underway")) return "status-red";
  if(s.includes("rtb")) return "status-orange";
  return "";
}

async function fetchSheetRows(){
  const query = encodeURIComponent("select B,C,D,E,F,G");
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows || [];
}

async function loadDashboard(){
  const rows = await fetchSheetRows();
  const grid = document.getElementById("boatGrid");
  grid.innerHTML = "";

  const boats = {};

  rows.forEach(row=>{
    const boat = row.c[0]?.v;
    if(!boat) return;

    if(!boats[boat]){
      boats[boat] = { persons:null, risk:"", gain:"", status:"", comment:"" };
    }

    // Persons: last non-blank (0 allowed)
    const personsCell = row.c[1]?.v;
    if(isPresent(personsCell)) boats[boat].persons = personsCell;

    // GAR: last submitted (ignore blank overwrites)
    const riskCell = row.c[2]?.v;
    const gainCell = row.c[3]?.v;
    if(isPresent(riskCell)) boats[boat].risk = riskCell;
    if(isPresent(gainCell)) boats[boat].gain = gainCell;

    // Status: most recent non-blank
    const statusCell = row.c[4]?.v;
    if(isPresent(statusCell) && String(statusCell).trim() !== "") boats[boat].status = statusCell;

    // Comments: ONLY from most recent row
    const commentCell = row.c[5]?.v;
    boats[boat].comment = isPresent(commentCell) ? commentCell : "";
  });

  Object.keys(boats).forEach(boat=>{
    const d = boats[boat];

    grid.innerHTML += `
      <div class="boatCard">
        <div class="text-lg font-bold">${boat}</div>
        <div class="text-sm">Persons on Board: ${d.persons !== null ? d.persons : "—"}</div>
        <div class="text-sm">GAR Risk: ${isPresent(d.risk) ? d.risk : "—"}</div>
        <div class="text-sm">GAR Gain: ${isPresent(d.gain) ? d.gain : "—"}</div>
        <div class="font-bold mt-2 ${statusColor(d.status)}">${isPresent(d.status) ? d.status : "—"}</div>
        ${d.comment ? `<div class="text-xs text-slate-400 mt-2">${d.comment}</div>` : ""}
      </div>
    `;
  });
}

document.getElementById("sheetFrame").src = SHEET_EMBED;

loadDashboard();
setInterval(loadDashboard, 30000);
</script>

</body>
</html>
