<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Force 3 Dashboard</title>
<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: system-ui, sans-serif; }
.boatCard { background:#0f172a; border-radius:14px; padding:16px; }
.status-green { color:#22c55e; }
.status-red { color:#ef4444; }
.status-orange { color:#f97316; }
</style>
</head>

<body class="bg-slate-900 text-white p-6">

<h1 class="text-3xl font-black mb-6 text-center">Task Force 3</h1>

<div id="boatGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

<script>
const SHEET_ID = "1Zd7SiEV9OOr20oWRB51Y6wUFCAhsM_H2YlqWD_FQW6Y";

function statusColor(status){
  if(!status) return "";
  const s=status.toLowerCase();
  if(s.includes("secure")) return "status-green";
  if(s.includes("underway")) return "status-red";
  if(s.includes("rtb")) return "status-orange";
  return "";
}

async function fetchSheet(){
  const query = encodeURIComponent("select B,C,D,E,F,G");
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0,-2));
  return json.table.rows || [];
}

async function loadData(){
  const rows = await fetchSheet();
  const grid = document.getElementById("boatGrid");
  grid.innerHTML = "";

  const latestPerBoat = {};

  rows.forEach(row=>{
    const boat = row.c[0]?.v;
    if(!boat) return;

    if(!latestPerBoat[boat]){
      latestPerBoat[boat] = { persons:"", risk:"", gain:"", status:"", comment:"" };
    }

    const current = latestPerBoat[boat];

    if(row.c[1]?.v) current.persons = row.c[1].v;
    if(row.c[2]?.v) current.risk = row.c[2].v;
    if(row.c[3]?.v) current.gain = row.c[3].v;
    if(row.c[4]?.v) current.status = row.c[4].v;
    if(row.c[5]?.v) current.comment = row.c[5].v;
  });

  Object.keys(latestPerBoat).forEach(boat=>{
    const data = latestPerBoat[boat];

    grid.innerHTML += `
      <div class="boatCard">
        <div class="text-lg font-bold">${boat}</div>
        <div class="text-sm">Persons: ${data.persons || "—"}</div>
        <div class="text-sm">GAR Risk: ${data.risk || "—"}</div>
        <div class="text-sm">GAR Gain: ${data.gain || "—"}</div>
        <div class="font-bold mt-2 ${statusColor(data.status)}">
          ${data.status || "—"}
        </div>
        ${data.comment ? `<div class="text-xs text-slate-400 mt-2">${data.comment}</div>` : ""}
      </div>
    `;
  });
}

loadData();
setInterval(loadData,30000);
</script>

</body>
</html>
