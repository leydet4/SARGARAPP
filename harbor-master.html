<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Harbor Master - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.statusCard {
  background:#0f172a;
  border-radius:14px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

#content { display:none; }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <img src="SAR.png" class="mx-auto h-14 mb-4">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>

    <input type="password"
           id="adminPassword"
           class="w-full p-3 rounded bg-slate-700 mb-4"
           placeholder="Enter Admin Password">

    <button onclick="checkPassword()"
      class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Harbor Master
    </button>
  </div>
</div>

<div id="content">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <img src="SAR.png" class="mx-auto h-16 mb-3">
  <h1 class="text-3xl font-black">🚢 Harbor Master</h1>

  <div class="mt-4">
    <a href="admin.html"
       class="px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm">
       ← Back to Admin
    </a>
  </div>
</header>

<section class="p-6 max-w-7xl mx-auto">

<div id="harborGrid"
     class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
</div>

</section>
</div>

<script>

const ADMIN_PASSWORD = "SAR2026";

window.addEventListener("load", () => {
  if (localStorage.getItem("sarAdminAuth") === "true") {
    showPage();
  }
});

function checkPassword() {
  const input = document.getElementById("adminPassword").value.trim();
  if (input === ADMIN_PASSWORD) {
    localStorage.setItem("sarAdminAuth", "true");
    showPage();
  }
}

function showPage() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("content").style.display = "block";
  loadHarborMaster();
}

/* =========================
   SHEET CONFIG
========================= */

const sheets = [
  { name: "Task Force 1", id: "1blTaHa4BTR8YGB7hL_kqWBE1qXkl9Ee2LEe_zLKbQGs" },
  { name: "Task Force 2", id: "1xv_jyreJSBH2_WgwrnwNFOH7MDRXGsLGf_vJNSB-lac" },
  { name: "Task Force 3", id: "1Zd7SiEV9OOr20oWRB51Y6wUFCAhsM_H2YlqWD_FQW6Y" },
  { name: "Task Force 4", id: "1_hrJRv0WLPdBWciRJrjr-y9WdNFoAbvJR22SZSQKUjo" }
];

/*
Column Mapping:
A = Timestamp
B = Boat
F = Status
G = Comment
*/

async function fetchLatestRow(sheetId) {

  const query = encodeURIComponent("select A,B,F,G order by A desc limit 1");
  const url =
    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tq=${query}`;

  const response = await fetch(url);
  const text = await response.text();

  const json = JSON.parse(text.substring(47).slice(0, -2));
  const row = json.table.rows[0]?.c;

  if (!row) return null;

  return {
    timestamp: row[0]?.v || "N/A",
    boat: row[1]?.v || "N/A",
    status: row[2]?.v || "N/A",
    comment: row[3]?.v || "N/A"
  };
}

async function loadHarborMaster() {

  const grid = document.getElementById("harborGrid");
  grid.innerHTML = "";

  for (let sheet of sheets) {

    const data = await fetchLatestRow(sheet.id);

    const card = document.createElement("div");
    card.className = "statusCard";

    if (!data) {
      card.innerHTML = `
        <div class="text-xl font-bold mb-3">${sheet.name}</div>
        <div class="text-red-400 font-semibold">
          No data available
        </div>
      `;
    } else {
      card.innerHTML = `
        <div class="text-xl font-bold mb-3">${sheet.name}</div>

        <div class="text-sm text-slate-400 mb-1">
          Boat:
          <span class="font-semibold text-white">
            ${data.boat}
          </span>
        </div>

        <div class="text-sm text-slate-400 mb-1">
          Status:
          <span class="font-semibold text-green-400">
            ${data.status}
          </span>
        </div>

        <div class="text-sm text-slate-400 mb-1">
          Last Updated:
          <span class="font-semibold text-white">
            ${data.timestamp}
          </span>
        </div>

        <div class="text-sm text-slate-400 mt-2">
          Comment:
          <div class="text-white mt-1 text-sm break-words">
            ${data.comment}
          </div>
        </div>
      `;
    }

    grid.appendChild(card);
  }
}

/* Auto refresh every 60 seconds */
setInterval(loadHarborMaster, 60000);

</script>

</body>
</html>
