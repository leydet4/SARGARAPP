<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Harbor Master - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }

.statusCard {
  background:#0f172a;
  border-radius:14px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

#content { display:none; }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="bg-slate-800 p-8 rounded-xl w-full max-w-md text-center">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>
    <input type="password" id="adminPassword"
      class="w-full p-3 rounded bg-slate-700 mb-4"
      placeholder="Enter Admin Password">
    <button onclick="checkPassword()"
      class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Harbor Master
    </button>
  </div>
</div>

<div id="content">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <h1 class="text-3xl font-black">🚢 Harbor Master</h1>
  <a href="admin.html"
     class="mt-3 inline-block px-4 py-2 bg-blue-600 rounded-lg text-sm font-bold">
     ← Back to Admin
  </a>
</header>

<section class="p-6 max-w-7xl mx-auto">
  <div id="harborGrid"
       class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  </div>
</section>

</div>

<script>

const ADMIN_PASSWORD = "SAR2026";

window.addEventListener("load", () => {
  if (localStorage.getItem("sarAdminAuth") === "true") {
    showPage();
  }
});

function checkPassword() {
  const input = document.getElementById("adminPassword").value.trim();
  if (input === ADMIN_PASSWORD) {
    localStorage.setItem("sarAdminAuth", "true");
    showPage();
  }
}

function showPage() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("content").style.display = "block";
  loadHarborMaster();
}

/* ===== SHEET CONFIG ===== */

const sheets = [
  { name: "TF1", id: "1blTaHa4BTR8YGB7hL_kqWBE1qXkl9Ee2LEe_zLKbQGs" },
  { name: "TF2", id: "1xv_jyreJSBH2_WgwrnwNFOH7MDRXGsLGf_vJNSB-lac" },
  { name: "TF3", id: "1Zd7SiEV9OOr20oWRB51Y6wUFCAhsM_H2YlqWD_FQW6Y" },
  { name: "TF4", id: "1_hrJRv0WLPdBWciRJrjr-y9WdNFoAbvJR22SZSQKUjo" }
];

/* ===== FETCH DATA ===== */

async function fetchSheetRows(sheetId) {
  const query = encodeURIComponent("select B,F,G");
  const url =
    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tq=${query}`;

  const response = await fetch(url);
  const text = await response.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));

  return json.table.rows || [];
}

/* ===== STATUS COLOR FUNCTION ===== */

function getStatusClass(status) {

  if (!status) return "text-slate-300";

  const normalized = status.toLowerCase();

  if (normalized.includes("secure"))
    return "text-green-400";

  if (normalized.includes("underway"))
    return "text-red-400";

  if (normalized.includes("rtb"))
    return "text-orange-400";

  return "text-slate-300";
}

/* ===== MAIN LOGIC ===== */

async function loadHarborMaster() {

  const grid = document.getElementById("harborGrid");
  grid.innerHTML = "";

  let totalCards = 0;

  for (let sheet of sheets) {

    const rows = await fetchSheetRows(sheet.id);

    if (!rows.length) continue;

    const latestByBoat = {};

    rows.forEach(r => {

      const boat = r.c[0]?.v;
      const status = r.c[1]?.v;
      const comment = r.c[2]?.v;

      if (!boat) return;

      latestByBoat[boat] = {
        status: status || "No Status",
        comment: comment || ""
      };

    });

    Object.keys(latestByBoat).forEach(boat => {

      const data = latestByBoat[boat];
      const statusClass = getStatusClass(data.status);

      grid.innerHTML += `
        <div class="statusCard">
          <div class="text-sm text-slate-400 mb-1">${sheet.name}</div>
          <div class="text-lg font-bold mb-2">${boat}</div>
          <div class="text-lg font-semibold ${statusClass}">
            ${data.status}
          </div>
          <div class="text-sm mt-2 break-words">
            ${data.comment}
          </div>
        </div>
      `;

      totalCards++;

    });

  }

  if (totalCards === 0) {
    grid.innerHTML = `
      <div class="statusCard text-center col-span-full">
        <div class="text-red-400 font-bold">
          No data available
        </div>
      </div>
    `;
  }
}

/* Auto Refresh every 60 seconds */
setInterval(loadHarborMaster, 60000);

</script>

</body>
</html>
