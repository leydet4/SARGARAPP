<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Task Force Tracking Aid - POV SAR 2026</title>

<link rel="icon" href="SAR.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: system-ui, sans-serif; }

.card {
  background:#1e293b;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 25px rgba(0,0,0,.35);
}

.select {
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#334155;
  font-weight:600;
  color:white;
}

#sheetContainer {
  width:100%;
  height:80vh;
  overflow:auto;
  border-radius:16px;
  background:white;
  box-shadow:0 0 25px rgba(0,0,0,.35);
  -webkit-overflow-scrolling: touch;
}

#sheetFrame {
  width:1400px;
  height:100%;
  border:none;
  transform:scale(.9);
  transform-origin: top left;
}

#content { display:none; }
</style>
</head>

<body class="bg-slate-900 text-white">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="card w-full max-w-md text-center">
    <img src="SAR.png" class="mx-auto h-14 mb-4">
    <h2 class="text-xl font-bold mb-4">Admin Access Required</h2>

    <input type="password"
           id="adminPassword"
           placeholder="Enter Admin Password"
           class="w-full p-3 rounded bg-slate-700 mb-4">

    <button onclick="checkPassword()"
            class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
      Enter Tracking Aid
    </button>

    <div id="loginError" class="mt-3 text-red-400 font-bold hidden">
      Incorrect password
    </div>
  </div>
</div>

<div id="content">

<header class="bg-slate-800 py-6 text-center shadow-lg">
  <img src="SAR.png" class="mx-auto h-16 mb-3">
  <h1 class="text-2xl font-black">Task Force Tracking Aid</h1>

  <div class="mt-4 flex justify-center gap-3 flex-wrap">
    <a href="admin.html"
       class="px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm">
       ← Back to Admin
    </a>

    <button onclick="logout()"
       class="px-5 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-sm">
       Logout
    </button>
  </div>
</header>

<section class="p-6 max-w-7xl mx-auto space-y-10">

<div class="card">

  <h2 class="text-xl font-bold mb-4">SAR Unit Tracking Responses</h2>

  <select id="trackingSelector" class="select mb-6">
    <option value="">Select Task Force...</option>
    <option value="TF1">Task Force 1</option>
    <option value="TF2">Task Force 2</option>
    <option value="TF3">Task Force 3</option>
    <option value="TF4">Task Force 4</option>
  </select>

  <!-- Form Button -->
  <div id="formButtonContainer" class="hidden mb-6">
    <a id="formLink" target="_blank"
       class="inline-block bg-emerald-600 hover:bg-emerald-700 px-5 py-3 rounded-lg font-bold">
       Open Submission Form
    </a>
  </div>

  <!-- Sheet Viewer -->
  <div id="sheetContainer" class="hidden">
    <iframe id="sheetFrame"></iframe>
  </div>

</div>

</section>
</div>

<script>

const ADMIN_PASSWORD = "SAR2026";

window.addEventListener("load", () => {
  if (localStorage.getItem("sarAdminAuth") === "true") {
    showContent();
  }
});

function checkPassword() {
  const input = document.getElementById("adminPassword").value.trim();
  if (input === ADMIN_PASSWORD) {
    localStorage.setItem("sarAdminAuth", "true");
    showContent();
  } else {
    document.getElementById("loginError").classList.remove("hidden");
  }
}

function showContent() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("content").style.display = "block";
}

function logout() {
  localStorage.removeItem("sarAdminAuth");
  location.reload();
}

/* =============================
   TASK FORCE DATA
============================= */

const taskForceData = {
  TF1: {
    form: "https://forms.gle/kdwPNq8T5dT4QjEZ7",
    sheet: "https://docs.google.com/spreadsheets/d/1blTaHa4BTR8YGB7hL_kqWBE1qXkl9Ee2LEe_zLKbQGs/gviz/tq?tqx=out:html"
  },
  TF2: {
    form: "https://forms.gle/K9pxiHaSGnCVG1Hs5",
    sheet: "https://docs.google.com/spreadsheets/d/1xv_jyreJSBH2_WgwrnwNFOH7MDRXGsLGf_vJNSB-lac/gviz/tq?tqx=out:html"
  },
  TF3: {
    form: "https://forms.gle/oecqWnBxEJERwyhJA",
    sheet: "https://docs.google.com/spreadsheets/d/1Zd7SiEV9OOr20oWRB51Y6wUFCAhsM_H2YlqWD_FQW6Y/gviz/tq?tqx=out:html"
  },
  TF4: {
    form: "https://forms.gle/gAEiQT2TPyRawFdVA",
    sheet: "https://docs.google.com/spreadsheets/d/1_hrJRv0WLPdBWciRJrjr-y9WdNFoAbvJR22SZSQKUjo/gviz/tq?tqx=out:html"
  }
};

document.getElementById("trackingSelector").addEventListener("change", function() {

  const value = this.value;
  const frame = document.getElementById("sheetFrame");
  const container = document.getElementById("sheetContainer");
  const formButton = document.getElementById("formButtonContainer");
  const formLink = document.getElementById("formLink");

  if (!value || !taskForceData[value]) {
    container.classList.add("hidden");
    formButton.classList.add("hidden");
    frame.src = "";
    return;
  }

  // Set form link
  formLink.href = taskForceData[value].form;
  formButton.classList.remove("hidden");

  // Set sheet iframe
  frame.src = taskForceData[value].sheet;
  container.classList.remove("hidden");
});

</script>

</body>
</html>
